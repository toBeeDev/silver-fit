name: Crawl FSS Annuity Products

on:
  schedule:
    - cron: '0 18 * * *' # 매일 UTC 18:00 (KST 03:00)
  workflow_dispatch: # 수동 실행

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run FSS crawler
        env:
          FSS_API_KEY: ${{ secrets.FSS_API_KEY }}
        run: npm run crawl:fss

      - name: Commit & push changes
        run: |
          git diff --quiet src/data/fss-annuity-products.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/fss-annuity-products.json
          git commit -m "chore: 금감원 연금저축보험 데이터 자동 업데이트 $(date +%Y-%m-%d)"
          git push
