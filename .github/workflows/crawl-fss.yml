name: Crawl FSS → Supabase

on:
  schedule:
    - cron: '0 18 * * 0' # 매주 일요일 UTC 18:00 (KST 월 03:00)
  workflow_dispatch: # 수동 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync FSS → Supabase
        env:
          FSS_API_KEY: ${{ secrets.FSS_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: npx tsx scripts/crawl-fss.ts

      - name: Trigger Vercel rebuild
        if: success()
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" || true
